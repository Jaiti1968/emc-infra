services:
  frontend:
    image: nginx:alpine
    container_name: emc-mitglieder-frontend-dev
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - "/volume1/docker/build/mitglieder-frontend-dev/dist:/usr/share/nginx/html:ro"
      - "/volume1/docker/build/mitglieder-frontend-dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - emc_net

networks:
  emc_net:
    external: true