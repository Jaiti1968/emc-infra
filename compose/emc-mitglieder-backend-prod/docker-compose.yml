services:
  emc-mitglieder-backend-prod:
    image: emc-mitglieder-backend:prod
    container_name: emc-mitglieder-backend-prod
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mariadb://mariadb:3306/emc_mitglieder
      DB_USERNAME: emc_backend_prod
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - emc_net

networks:
  emc_net:
    external: true