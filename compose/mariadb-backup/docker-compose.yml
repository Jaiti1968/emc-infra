services:
  mariadb-backup:
    image: fradelg/mysql-cron-backup
    container_name: mariadb-backup
    restart: unless-stopped
    environment:
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASS: ${MYSQL_PASS}
      
      # 👇 NUR DIESE DBs!
      MYSQL_DATABASE: emc_mitglieder emc_mitglieder_dev emc_finanzen emc_finanzen_dev
      
      MAX_BACKUPS: 14
      INIT_BACKUP: 1
      CRON_TIME: "0 3 * * *"
      GZIP_LEVEL: 6
    volumes:
      - /volume1/docker/backups/mariadb:/backup
    networks:
      - mariadb_default

networks:
  mariadb_default:
    external: true
